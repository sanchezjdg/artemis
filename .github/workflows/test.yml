name: Deploy Individual Staging

on:
  push:
    branches:
      - juan
      - moixnt
      - edwin
      - jfelipe
      - SamirUwu

jobs:
  deploy:
    runs-on: ${{ needs.set-runner.outputs.runner }}
    needs: set-runner

    steps:
      - uses: actions/checkout@v2

      - name: Set environment for each user
        id: env
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "juan" ]; then PORT=3101; NAME=juan;
          elif [ "$BRANCH" = "moixnt" ]; then PORT=3102; NAME=may;
          elif [ "$BRANCH" = "edwin" ]; then PORT=3103; NAME=edwin;
          elif [ "$BRANCH" = "jfelipe" ]; then PORT=3104; NAME=felipe;
          elif [ "$BRANCH" = "SamirUwu" ]; then PORT=3105; NAME=samir;
          else echo "Rama no válida" && exit 1; fi

          echo "port=$PORT" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Setup Web Server (per collaborator)
        run: |
          rm -rf staging/${{ steps.env.outputs.name }}
          mkdir -p staging/${{ steps.env.outputs.name }}
          cp -r web-server/. staging/${{ steps.env.outputs.name }}/
        
          cd staging/${{ steps.env.outputs.name }}
          npm install
            
          cp ~/env-variables/.env-test .env-test
        
          echo "PORT=${{ steps.env.outputs.port }}" >> .env-test
          echo "WEBSITE_NAME=${{ steps.env.outputs.name }}" >> .env-test
          echo "ENABLE_HTTPS=false" >> .env-test
          echo "ENV_PATH=.env-test" >> .env-test
        
          sudo pm2 delete web-${{ steps.env.outputs.name }} || true
          sudo pm2 start server.js --name web-${{ steps.env.outputs.name }} --env ENV_PATH=.env-test

  set-runner:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.set.outputs.runner }}
    steps:
      - name: Detect runner based on branch
        id: set
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "juan" ]; then RUNNER="artemis-juan";
          elif [ "$BRANCH" = "moixnt" ]; then RUNNER="artemis-may";
          elif [ "$BRANCH" = "edwin" ]; then RUNNER="artemis-edwin";
          elif [ "$BRANCH" = "jfelipe" ]; then RUNNER="artemis-felipe";
          elif [ "$BRANCH" = "SamirUwu" ]; then RUNNER="artemis-s9";
          else echo "No se encontró runner" && exit 1; fi
          echo "runner=$RUNNER" >> $GITHUB_OUTPUT